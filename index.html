<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Savings Progress App - Final Version</title>
<style>
  /* Dark theme base */
  body {
    margin: 0;
    background-color: #121212;
    color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 15px 100px; /* Added bottom padding for the button space */
    min-height: 100vh;
    box-sizing: border-box;
  }

  /* Share Button - Fixed bottom-right */
  #share-btn {
    position: fixed;
    bottom: 30px;
    right: 25px;
    background: linear-gradient(135deg, #4a90e2, #629fcc);
    border: none;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    color: #fff;
    font-size: 1.5rem;
    box-shadow: 0 8px 20px rgba(74, 144, 226, 0.5);
    cursor: pointer;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease;
  }
  #share-btn:active { transform: scale(0.9); }

  /* Countdown timer */
  #countdown {
    font-weight: 600;
    font-size: 1.1rem;
    margin-top: 10px;
    margin-bottom: 30px;
    text-align: center;
    color: #76aaff;
  }

  /* Success Popup */
  #success-popup {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #1e2338;
    color: #fff;
    padding: 12px 20px;
    border-radius: 12px;
    font-weight: 600;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s ease;
    z-index: 1000;
    text-align: center;
    border: 1px solid #4a90e2;
    max-width: 85vw;
  }
  #success-popup.show {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
  }

  /* Victory Gift Overlay */
  #victory-gift {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 10rem;
    z-index: 2000;
    display: none;
    text-shadow: 0 0 30px #ffd700;
    pointer-events: none;
  }

  /* Goal text */
  #goal-container { text-align: center; margin-bottom: 22px; }
  #goal-label { font-weight: 500; font-size: 1.2rem; color: #a0a0a0; margin-bottom: 5px; }
  #goal-value { font-weight: 900; font-size: 3rem; letter-spacing: 0.05em; }

  /* Progress Bar */
  #progress-wrapper { width: 100%; max-width: 400px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
  #progress-bar-bg { flex: 1; height: 20px; background-color: #2a2f42; border-radius: 10px; overflow: hidden; }
  #progress-bar { height: 100%; width: 0%; transition: width 0.5s ease, background 0.5s ease; border-radius: 10px 0 0 10px; }
  
  /* Milestone Colors */
  .default { background: linear-gradient(90deg, #4a90e2, #629fcc); }
  .bronze { background: linear-gradient(90deg, #cd7f32, #d4a757); box-shadow: 0 0 12px rgba(205, 127, 50, 0.6); }
  .silver { background: linear-gradient(90deg, #c0c0c0, #e5e5e5); box-shadow: 0 0 16px rgba(192, 192, 192, 0.7); }
  .gold { background: linear-gradient(90deg, #ffd700, #ffed4e); box-shadow: 0 0 24px rgba(255, 215, 0, 0.9); }

  #progress-percent { font-weight: 700; font-size: 1rem; min-width: 45px; text-align: right; }

  /* Savings Info */
  #total-savings { font-size: 1.4rem; font-weight: 700; margin: 10px 0 5px; text-align: center; }
  #last-entry { font-size: 0.85rem; color: #a0a0a0; font-weight: 500; margin-bottom: 32px; text-align: center; }

  /* Buttons */
  #buttons-container { display: flex; justify-content: center; flex-wrap: wrap; max-width: 360px; gap: 14px 20px; margin-bottom: 45px; }
  .btn-increment { min-width: 70px; background-color: #2a2f42; border: none; border-radius: 18px; padding: 13px 0; color: #e5e5e5; font-size: 1.3rem; font-weight: 600; cursor: pointer; transition: background 0.3s; }
  .btn-increment:active { transform: scale(0.95); background-color: #3b4362; }

  /* Input */
  #input-container { width: 100%; max-width: 380px; text-align: center; }
  #input-savings { background: transparent; border: none; border-bottom: 2px solid #629fcc; font-size: 1.25rem; font-weight: 600; color: #76aaff; outline: none; padding: 6px 12px; width: 100%; text-align: center; }
</style>
</head>
<body>

<button id="share-btn" aria-label="Share">📤</button>

<div id="countdown">Goal Deadline: 14 Aug</div>
<div id="success-popup"></div>
<div id="victory-gift">🎁</div>

<div id="goal-container">
  <div id="goal-label">GOAL</div>
  <div id="goal-value">0 - 2000</div>
</div>

<div id="progress-wrapper">
  <div id="progress-bar-bg"><div id="progress-bar" class="default"></div></div>
  <div id="progress-percent">0%</div>
</div>

<div id="total-savings">Total Savings: 0</div>
<div id="last-entry">Last added: ₹0 on Never</div>

<div id="buttons-container">
  <button class="btn-increment" data-val="5">5</button>
  <button class="btn-increment" data-val="10">10</button>
  <button class="btn-increment" data-val="20">20</button>
  <button class="btn-increment" data-val="50">50</button>
  <button class="btn-increment" data-val="100">100</button>
</div>

<div id="input-container">
  <input type="number" id="input-savings" placeholder="enter savings" />
</div>

<script>
  (function() {
    const goalMax = 2000;
    const targetDate = new Date(2026, 7, 14); // August 14th

    let totalSavings = 0;
    let highestPercent = 0;
    let lastAmount = 0;
    let lastDate = 'Never';

    const countdownEl = document.getElementById('countdown');
    const goalValueEl = document.getElementById('goal-value');
    const progressBar = document.getElementById('progress-bar');
    const progressPercentEl = document.getElementById('progress-percent');
    const totalSavingsEl = document.getElementById('total-savings');
    const lastEntryEl = document.getElementById('last-entry');
    const inputSavings = document.getElementById('input-savings');
    const successPopup = document.getElementById('success-popup');
    const victoryGift = document.getElementById('victory-gift');

    const successMessages = [
     "Great job! 🎁",
      "You're accelerating towards your goal! 🚀",
      "Keep it up! ✨",
      "₹5 closer to your dream! 💰",
      "Imagine the look on their face when they open this! 🎁",
      "Every rupee is a part of the best surprise ever. ✨",
      "You're not just saving money; you're saving a memory! 🎈",
      "Almost there! They are going to be so shocked. 😍",
      "The best gifts aren't bought, they are earned with effort like this. 💪",
      "Picture their happy face! That's what this is for. 😊",
      "A special person deserves a special gift. Keep going! 🎂",
      "₹[Amount] closer to making their birthday perfect! 🚀",
      "You just accelerated! The countdown is on. ⏳",
      "Goal: ₹2000. Current status: Unstoppable Friend! 🔥",
      "Every bit counts when it's for a surprise this big! 💰"
    ];

    function loadFromStorage() {
      totalSavings = Number(localStorage.getItem('savings-total')) || 0;
      highestPercent = Number(localStorage.getItem('savings-highest-percent')) || 0;
      lastAmount = Number(localStorage.getItem('savings-last-amount')) || 0;
      lastDate = localStorage.getItem('savings-last-date') || 'Never';
    }

    function saveToStorage() {
      localStorage.setItem('savings-total', totalSavings);
      localStorage.setItem('savings-highest-percent', highestPercent);
      localStorage.setItem('savings-last-amount', lastAmount);
      localStorage.setItem('savings-last-date', lastDate);
    }

    function updateUI() {
      goalValueEl.textContent = `${totalSavings} - ${goalMax}`;
      totalSavingsEl.textContent = `Total Savings: ${totalSavings}`;
      lastEntryEl.textContent = `Last added: ₹${lastAmount} on ${lastDate}`;

      const currentPercent = Math.min(100, Math.floor((totalSavings / goalMax) * 100));
      if (currentPercent > highestPercent) {
        highestPercent = currentPercent;
      }
      
      progressBar.style.width = highestPercent + '%';
      progressPercentEl.textContent = highestPercent + '%';

      progressBar.className = ''; 
      if (highestPercent >= 100) {
        progressBar.classList.add('gold');
        victoryGift.style.display = 'block';
        victoryGift.style.animation = 'giftVictory 2s forwards';
      } else if (highestPercent >= 50) {
        progressBar.classList.add('silver');
      } else if (highestPercent >= 25) {
        progressBar.classList.add('bronze');
      } else {
        progressBar.classList.add('default');
      }

      const now = new Date();
      const diffMs = targetDate - now;
      const diffDays = Math.max(0, Math.floor(diffMs / (1000 * 60 * 60 * 24)));
      countdownEl.textContent = `Goal Deadline: 14 Aug (${diffDays} days left)`;
    }

    function addSavings(amount) {
      if (isNaN(amount) || amount <= 0) return;
      
      lastAmount = amount;
      const d = new Date();
      lastDate = d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
      
      totalSavings = Math.min(goalMax, totalSavings + amount);
      
      saveToStorage();
      updateUI();
      
      const msg = successMessages[Math.floor(Math.random() * successMessages.length)];
      successPopup.textContent = msg;
      successPopup.classList.add('show');
      setTimeout(() => successPopup.classList.remove('show'), 2000);
    }

    document.getElementById('buttons-container').onclick = (e) => {
      if (e.target.classList.contains('btn-increment')) {
        addSavings(Number(e.target.dataset.val));
      }
    };

    inputSavings.onkeydown = (e) => {
      if (e.key === 'Enter') {
        addSavings(Number(inputSavings.value));
        inputSavings.value = '';
      }
    };

    document.getElementById('share-btn').onclick = () => {
        const shareText = `Progress Update: ₹${totalSavings}/₹${goalMax} saved for the big surprise! (${highestPercent}%). Gift loading for 14 Aug! 🎁`;
        if (navigator.share) {
            navigator.share({ text: shareText });
        } else {
            navigator.clipboard.writeText(shareText);
            alert("Progress copied to clipboard! Paste it in your DMs.");
        }
    };

    loadFromStorage();
    updateUI();
  })();
</script>
</body>
</html>
