<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Savings Progress App with Success Popup</title>
<style>
  /* Dark theme base */
  body {
    margin: 0;
    background-color: #121212;
    color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 15px 40px;
    height: 100vh;
    box-sizing: border-box;
  }

  /* Countdown timer at top */
  #countdown {
    font-weight: 600;
    font-size: 1.1rem;
    margin-top: 10px;
    margin-bottom: 30px;
    letter-spacing: 0.03em;
    text-align: center;
  }

  /* Success Popup */
  #success-popup {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #2a2f42, #1e2338);
    color: #fff;
    padding: 16px 24px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 1rem;
    box-shadow: 
      0 12px 32px rgba(74, 144, 226, 0.4),
      0 0 0 1px rgba(74, 144, 226, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
    opacity: 0;
    visibility: hidden;
    transform: translateX(-50%) translateY(-20px);
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    z-index: 1000;
    max-width: 90vw;
    text-align: center;
    letter-spacing: 0.02em;
  }
  #success-popup.show {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
  }

  /* Goal text section */
  #goal-container {
    text-align: center;
    margin-bottom: 22px;
    user-select: none;
  }
  #goal-label {
    font-weight: 500;
    font-size: 1.2rem;
    letter-spacing: 0.07em;
    margin-bottom: 5px;
  }
  #goal-value {
    font-weight: 900;
    font-size: 3rem;
    letter-spacing: 0.05em;
    user-select: text;
  }

  /* Progress bar container */
  #progress-wrapper {
    width: 100%;
    max-width: 400px;
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 12px;
  }

  /* Progress bar background */
  #progress-bar-bg {
    flex: 1;
    height: 20px;
    background-color: #2a2f42;
    border-radius: 10px;
    overflow: hidden;
  }
  /* Progress bar filled */
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #4a90e2, #629fcc);
    width: 0%;
    transition: width 0.4s ease;
    border-radius: 10px 0 0 10px;
  }
  /* Progress % text */
  #progress-percent {
    font-weight: 700;
    font-size: 1rem;
    min-width: 45px;
    text-align: right;
    user-select: none;
  }

  /* Total savings display below progress */
  #total-savings {
    font-size: 1.4rem;
    font-weight: 700;
    margin: 10px 0 32px;
    user-select: text;
    text-align: center;
  }

  /* Buttons container */
  #buttons-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 360px;
    gap: 14px 20px;
    margin-bottom: 45px;
  }

  /* Each increment button */
  .btn-increment {
    min-width: 70px;
    background-color: #2a2f42;
    border: none;
    border-radius: 18px;
    padding: 13px 0;
    color: #e5e5e5;
    font-size: 1.3rem;
    font-weight: 600;
    box-shadow: 0 4px 6px rgba(74,144,226,0.45);
    cursor: pointer;
    user-select: none;
    transition: background-color 0.3s ease;
  }
  .btn-increment:active {
    background-color: #3b4362;
  }

  /* Input field container */
  #input-container {
    width: 100%;
    max-width: 380px;
    text-align: center;
  }

  /* Input field styling */
  #input-savings {
    background: transparent;
    border: none;
    border-bottom: 2px solid #629fcc;
    font-size: 1.25rem;
    font-weight: 600;
    color: #76aaff;
    outline: none;
    padding: 6px 12px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    caret-color: #76aaff;
    letter-spacing: 0.07em;
  }
  #input-savings::placeholder {
    color: #76aaffa0;
    font-weight: 500;
  }

  /* Responsive text scaling for smaller screens */
  @media (max-width: 320px) {
    #goal-value {
      font-size: 2.3rem;
    }
    .btn-increment {
      min-width: 55px;
      font-size: 1.1rem;
      padding: 10px 0;
    }
  }
</style>
</head>
<body>

<div id="countdown">Days remaining till 3 Sep: ... days</div>

<!-- Success Popup -->
<div id="success-popup"></div>

<div id="goal-container" aria-label="Savings Goal">
  <div id="goal-label">GOAL</div>
  <div id="goal-value">0 - 2000</div>
</div>

<div id="progress-wrapper" aria-label="Savings Progress">
  <div id="progress-bar-bg" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
    <div id="progress-bar"></div>
  </div>
  <div id="progress-percent">0%</div>
</div>

<div id="total-savings" aria-live="polite" aria-atomic="true" aria-relevant="text">Total Savings: 0</div>

<div id="buttons-container" aria-label="Add Savings Amount Buttons">
  <button class="btn-increment" data-val="5">5</button>
  <button class="btn-increment" data-val="10">10</button>
  <button class="btn-increment" data-val="20">20</button>
  <button class="btn-increment" data-val="50">50</button>
  <button class="btn-increment" data-val="100">100</button>
</div>

<div id="input-container">
  <input
    type="number"
    id="input-savings"
    placeholder="enter savings"
    aria-label="Enter savings amount"
    min="0"
    step="1"
  />
</div>

<script>
  (function() {
    const goalMax = 2000;
    const goalMin = 0;

    // Retrieve saved from localStorage or default 0
    let totalSavings = 0;
    let highestPercent = 0;

    // Elements references
    const countdownEl = document.getElementById('countdown');
    const goalValueEl = document.getElementById('goal-value');
    const progressBar = document.getElementById('progress-bar');
    const progressPercentEl = document.getElementById('progress-percent');
    const totalSavingsEl = document.getElementById('total-savings');
    const buttonsContainer = document.getElementById('buttons-container');
    const inputSavings = document.getElementById('input-savings');
    const progressBarBg = document.getElementById('progress-bar-bg');
    const successPopup = document.getElementById('success-popup');

    // Storage keys
    const STORAGE_TOTAL_KEY = 'savings-total';
    const STORAGE_HIGHEST_PERCENT_KEY = 'savings-highest-percent';

    // Success messages - Emotional & Birthday + Milestone
    const successMessages = [
      "Great job! 🎁",
      "You're accelerating towards your goal! 🚀",
      "Keep it up! ✨",
      "₹5 closer to your dream! 💰",
      "Imagine the look on their face when they open this! 🎁",
      "Every rupee is a part of the best surprise ever. ✨",
      "You're not just saving money; you're saving a memory! 🎈",
      "Almost there! They are going to be so shocked. 😍",
      "The best gifts aren't bought, they are earned with effort like this. 💪",
      "Picture their happy face! That's what this is for. 😊",
      "A special person deserves a special gift. Keep going! 🎂",
      "₹[Amount] closer to making their birthday perfect! 🚀",
      "You just accelerated! The countdown is on. ⏳",
      "Goal: ₹2000. Current status: Unstoppable Friend! 🔥",
      "Every bit counts when it's for a surprise this big! 💰"
    ];

    // Load saved data
    function loadFromStorage() {
      const savedTotal = localStorage.getItem(STORAGE_TOTAL_KEY);
      const savedPercent = localStorage.getItem(STORAGE_HIGHEST_PERCENT_KEY);
      totalSavings = savedTotal !== null ? Math.min(goalMax, Number(savedTotal)) : 0;
      highestPercent = savedPercent !== null ? Number(savedPercent) : 0;
    }

    // Save data to localStorage
    function saveToStorage() {
      localStorage.setItem(STORAGE_TOTAL_KEY, totalSavings);
      localStorage.setItem(STORAGE_HIGHEST_PERCENT_KEY, highestPercent);
    }

    // Show success popup with random message
    function showSuccessPopup(amount = null) {
      // Pick random message
      const randomIndex = Math.floor(Math.random() * successMessages.length);
      let message = successMessages[randomIndex];
      
      // Replace [Amount] placeholder if amount provided
      if (amount) {
        message = message.replace('₹[Amount]', `₹${amount}`);
      }
      
      successPopup.textContent = message;
      
      // Show popup with animation
      successPopup.classList.add('show');
      
      // Auto-hide after 2 seconds
      setTimeout(() => {
        successPopup.classList.remove('show');
      }, 2000);
    }

    // Display the countdown days till Sep 3, 2026
    function updateCountdown() {
      const now = new Date();
      const target = new Date(2026, 8, 3); // Months are 0-based: 8 = Sept
      const diffMs = target - now;
      const diffDays = Math.max(0, Math.floor(diffMs / (1000 * 60 * 60 * 24)));
      countdownEl.textContent = `Days remaining till 3 Sep: ${diffDays} day${diffDays !== 1 ? 's' : ''}`;
    }

    // Update the goal text "X - 2000"
    function updateGoalText() {
      goalValueEl.textContent = `${totalSavings} - ${goalMax}`;
    }

    // Update progress bar and percentage with sticky progress logic
    function updateProgress() {
      const percent = Math.min(100, Math.floor((totalSavings / goalMax) * 100));
      if (percent > highestPercent) {
        highestPercent = percent;
      }
      progressBar.style.width = highestPercent + '%';
      progressPercentEl.textContent = highestPercent + '%';
      // Update ARIA progressbar value
      progressBarBg.setAttribute('aria-valuenow', highestPercent);
    }

    // Update total savings displayed
    function updateTotalSavings() {
      totalSavingsEl.textContent = `Total Savings: ${totalSavings}`;
    }

    // Handle adding new saving amount (increment/add)
    function addSavings(amount) {
      if (typeof amount !== 'number' || isNaN(amount) || amount <= 0) return;
      totalSavings += amount;
      if (totalSavings > goalMax) totalSavings = goalMax;
      
      updateGoalText();
      updateProgress();
      updateTotalSavings();
      
      saveToStorage();
      
      // Show success popup with amount
      showSuccessPopup(amount);
      
      inputSavings.value = '';
    }

    // Handle manual input submission on Enter or blur
    function handleInputSubmit() {
      const val = Number(inputSavings.value);
      if (!isNaN(val) && val > 0) {
        totalSavings += val;
        if (totalSavings > goalMax) totalSavings = goalMax;
        
        updateGoalText();
        updateProgress();
        updateTotalSavings();
        
        saveToStorage();
        
        // Show success popup with entered amount
        showSuccessPopup(val);
        
        inputSavings.value = '';
      }
    }

    // Initialize UI with loaded or default values
    function init() {
      loadFromStorage();
      updateCountdown();
      updateGoalText();
      updateProgress();
      updateTotalSavings();
      saveToStorage(); // Ensure initial load is saved
    }

    setInterval(updateCountdown, 60000);
    updateCountdown();

    // Buttons handlers
    buttonsContainer.addEventListener('click', (e) => {
      if (e.target.classList.contains('btn-increment')) {
        const val = Number(e.target.getAttribute('data-val'));
        addSavings(val);
      }
    });

    // Input handlers
    inputSavings.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleInputSubmit();
      }
    });

    inputSavings.addEventListener('blur', () => {
      handleInputSubmit();
    });

    init();
  })();
</script>

</body>
</html>
